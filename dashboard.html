<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">

    <!-- Remix Icons -->
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
        rel="stylesheet">
</head>
<body>

    <!-- Dashboard Container -->
    <div class="dashboard">
        <!-- Overlay -->
<div class="overlay" id="overlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">

    <div class="sidebar-top">

        <h2 class="sidebar-logo">
            <img height="100px" src="media/ChatGPT Image Jun 5, 2026, 03_46_39 AM.png" alt="">
        </h2>

        <button class="sidebar-close" id="closeSidebar">
            <i class="ri-close-line"></i>
        </button>

    </div>

    <nav class="sidebar-nav">

        <a href="#" class="sidebar-link active">
            <i class="ri-home-5-line"></i>
            <span>Dashboard</span>
        </a>

        <a href="#" class="sidebar-link">
            <i class="ri-pie-chart-line"></i>
            <span>Portfolio</span>
        </a>

        <a href="#" class="sidebar-link">
            <i class="ri-file-list-3-line"></i>
            <span>Transactions</span>
        </a>

        <a href="#" class="sidebar-link">
            <i class="ri-bank-card-line"></i>
            <span>Deposit</span>
        </a>

        <a href="#" class="sidebar-link">
            <i class="ri-wallet-3-line"></i>
            <span>Withdraw</span>
        </a>

        <a href="#" class="sidebar-link">
            <i class="ri-settings-3-line"></i>
            <span>Settings</span>
        </a>

    </nav>

    <div class="sidebar-bottom">

        <button class="logout-btn" id="logoutBtn">

            <i class="ri-logout-box-r-line"></i>

            Logout

        </button>

    </div>

</aside>
        <!-- Header -->
        <header class="dashboard-header">

            <button class="menu-btn" aria-label="Open Menu" id="openSidebar">
                <i class="ri-menu-line"></i>
            </button>

            <h1 class="logo">
                <img height="150px" src="media/ChatGPT Image Jun 5, 2026, 03_46_39 AM.png" alt="">
            </h1>

            <button class="profile-btn" aria-label="Profile">
                <i class="ri-user-3-line"></i>
            </button>

        </header>

        <!-- Main Content -->
        <main class="dashboard-main">

            <!-- Welcome Card -->
            <section class="welcome-card">

                <div class="welcome-content">

                    <span class="welcome-tag">
                        Welcome Back
                    </span>

                    <h1 id="welcome-name"></h1>
                    <p class="welcome-text">
                        Manage your assets and track your financial activity.
                    </p>

                </div>

            </section>

            <!-- Balance Card -->
            <section class="balance-card">

                <p class="balance-label">
                    Total Balance
                </p>

                <h2 class="balance-amount">
                    $0.00
                </h2>

                <button class="deposit-btn">
                    Deposit Funds
                </button>

            </section>

            <!-- Quick Actions -->
            <section class="actions-section">

                <h3 class="section-title">
                    Quick Actions
                </h3>

                <div class="actions-grid">

                    <button class="action-card">
                        <i class="ri-bank-card-line"></i>
                        <span>Deposit</span>
                    </button>

                    <button class="action-card">
                        <i class="ri-wallet-3-line"></i>
                        <span>Withdraw</span>
                    </button>

                    <button class="action-card">
                        <i class="ri-exchange-dollar-line"></i>
                        <span>Buy</span>
                    </button>

                    <button class="action-card">
                        <i class="ri-line-chart-line"></i>
                        <span>Sell</span>
                    </button>

                </div>

            </section>

        </main>


    <script src="dashboard.js"></script>
    <script>
  // Get the logged-in user
  const user = JSON.parse(sessionStorage.getItem('nv_session'));

  // If no one is logged in, send them back to sign in
  if(!user) {
    window.location.href = 'signin.html';
  }
  // Display their details
  document.getElementById('welcome-name').textContent = user.firstName +'!';
  </script>
</body>
</html>
