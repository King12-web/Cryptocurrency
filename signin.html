<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoonVault – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#C9A84C;--gold-light:#F0D080;--dark:#07090E;--card:#0F1219;
      --border:#1E2330;--border2:#2A3040;--text:#E8EAF2;--muted:#5A6075;
      --muted2:#8891A8;--success:#1D9E75;--danger:#E24B4A;--input:#0A0D14;
    }
    body{font-family:'Syne',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(201,168,76,.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(201,168,76,.05) 0%,transparent 60%);}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(201,168,76,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.025) 1px,transparent 1px);background-size:44px 44px;}
    .wrap{position:relative;z-index:1;width:100%;max-width:420px;}
    .top-bar{display:flex;align-items:center;justify-content:center;margin-bottom:2rem;gap:10px;}
    .logo-icon{width:38px;height:38px;border-radius:9px;background:var(--gold);display:flex;align-items:center;justify-content:center;}
    .logo-icon svg{width:21px;height:21px;}
    .logo-text{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;letter-spacing:2.5px;color:var(--text);}
    .card{background:var(--card);border:1px solid var(--border2);border-radius:18px;overflow:hidden;position:relative;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
    .card-head{padding:2rem 2rem 0;text-align:center;}
    .card-head h1{font-size:22px;font-weight:800;margin-bottom:4px;}
    .card-head p{font-size:13px;color:var(--muted2);}
    .card-body{padding:1.75rem 2rem 2rem;display:flex;flex-direction:column;gap:.9rem;}
    .field{display:flex;flex-direction:column;gap:5px;}
    .field label{font-size:11px;font-weight:700;color:var(--muted2);letter-spacing:1.2px;text-transform:uppercase;}
    .field input{background:var(--input);border:1px solid var(--border2);border-radius:9px;padding:11px 14px;font-family:'Syne',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}
    .field input::placeholder{color:var(--muted);}
    .field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.1);}
    .toast{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;display:none;align-items:center;gap:8px;}
    .toast.show{display:flex;}
    .toast.err{background:rgba(226,75,74,.12);border:1px solid rgba(226,75,74,.25);color:#F09595;}
    .toast.ok{background:rgba(29,158,117,.12);border:1px solid rgba(29,158,117,.25);color:#5DCAA5;}
    .btn{width:100%;padding:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;background:var(--gold);color:#07090E;border:none;border-radius:9px;cursor:pointer;letter-spacing:.5px;transition:all .2s;}
    .btn:hover{background:var(--gold-light);}
    .btn:active{transform:scale(.98);}
    .btn:disabled{opacity:.6;cursor:not-allowed;}
    .divider{height:1px;background:var(--border);margin:.25rem 0;}
    .live-row{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;padding:.4rem 0;}
    .ldot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .footer-link{text-align:center;font-size:12px;color:var(--muted);padding-bottom:1.75rem;}
    .footer-link a{color:var(--gold);font-weight:700;text-decoration:none;}
    .footer-link a:hover{text-decoration:underline;}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#07090E;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div class="logo-icon">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="#07090E" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M10 2v12M3 6l7 4 7-4" stroke="#07090E" stroke-width="1.6"/>
      </svg>
    </div>
    <span class="logo-text">MOONVAULT</span>
  </div>
  <div class="card">
    <div class="card-head">
      <h1>Welcome Back</h1>
      <p>Sign in to access your vault</p>
    </div>
    <div class="card-body">
      <div id="toast" class="toast"></div>
      <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSignIn()"/></div>
      <div class="divider"></div>
      <button class="btn" id="signin-btn" onclick="doSignIn()">Access Vault</button>
      <div class="live-row"><span class="ldot"></span><span>Secured by Firebase</span></div>
    </div>
    <div class="footer-link">No account? <a href="signup.html">Create one →</a></div>
  </div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, setDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAv056-KI59msQm4uOW4BKt0w-fmYvdGM0",
    authDomain: "nexvault-cc19b.firebaseapp.com",
    projectId: "nexvault-cc19b",
    storageBucket: "nexvault-cc19b.firebasestorage.app",
    messagingSenderId: "118681339828",
    appId: "1:118681339828:web:67ecefa9c356e57d3f14e1"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  function toast(msg, type){
    const t = document.getElementById('toast');
    t.className = 'toast show ' + type;
    t.innerHTML = msg;
    clearTimeout(window._tt);
    window._tt = setTimeout(()=>{ t.className='toast'; }, 5000);
  }

  function setLoading(on){
    const btn = document.getElementById('signin-btn');
    btn.disabled = on;
    btn.innerHTML = on ? '<span class="spinner"></span>Signing in…' : 'Access Vault';
  }

  window.doSignIn = async function(){
    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    if(!email||!password){ toast('⚠ Please fill in all fields.','err'); return; }

    setLoading(true);
    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const uid  = cred.user.uid;

      const snap = await getDoc(doc(db, 'users', uid));
      if(!snap.exists()){ toast('⚠ Profile not found. Contact support.','err'); setLoading(false); return; }

      const u = snap.data();
      await updateDoc(doc(db, 'users', uid), { lastLogin: serverTimestamp(), loginCount: increment(1) });
      await setDoc(doc(db, 'logs', 'log_' + Date.now()), {
        type: 'signin', email, username: u.username||'', uid, ts: serverTimestamp(),
      });

      sessionStorage.setItem('nv_session', JSON.stringify({
        uid, firstName: u.firstName, lastName: u.lastName, username: u.username,
        email: u.email, dob: u.dob, sex: u.sex, country: u.country, balance: u.balance||0,
      }));

      toast('✓ Access granted','ok');
      setTimeout(()=>{ window.location.href='dashboard.html'; }, 1500);

    } catch(err){
      setLoading(false);
      try {
        await setDoc(doc(db, 'logs', 'log_' + Date.now()), {
          type: 'fail', email, username: '', uid: '', ts: serverTimestamp(),
        });
      } catch(_){}
      if(err.code==='auth/user-not-found'||err.code==='auth/wrong-password'||err.code==='auth/invalid-credential'){
        toast('✕ Incorrect email or password.','err');
      } else if(err.code==='auth/too-many-requests'){
        toast('⚠ Too many attempts. Try again later.','err');
      } else {
        toast('⚠ '+err.message,'err');
      }
    }
  };
</script>
</body>
</html>
