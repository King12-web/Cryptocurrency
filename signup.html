<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexVault — Auth</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:    #C9A84C;
    --gold-d:  #A8872F;
    --teal:    #1D9E75;
    --danger:  #E24B4A;
    --bg:      #0B0C0E;
    --surface: #13151A;
    --card:    #1A1D24;
    --border:  rgba(255,255,255,0.08);
    --text:    #F0EDE6;
    --muted:   rgba(240,237,230,0.45);
    --font-h:  'Syne', sans-serif;
    --font-b:  'DM Sans', sans-serif;
  }

  body {
    font-family: var(--font-b);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .wrap { width: 100%; max-width: 420px; }

  .logo { text-align: center; margin-bottom: 2.5rem; }
  .logo-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%);
    margin-bottom: 12px;
  }
  .logo-mark svg { width: 28px; height: 28px; }
  .logo h1 { font-family: var(--font-h); font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .logo p  { font-size: 13px; color: var(--muted); margin-top: 3px; }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 2rem;
  }

  .tabs {
    display: flex; background: var(--surface); border-radius: 10px;
    padding: 3px; margin-bottom: 1.75rem;
  }
  .tab {
    flex: 1; padding: 8px; border: none; background: transparent;
    border-radius: 8px; font-family: var(--font-b); font-size: 13.5px;
    font-weight: 500; color: var(--muted); cursor: pointer; transition: all .18s;
  }
  .tab.active { background: var(--card); color: var(--text); box-shadow: 0 1px 6px rgba(0,0,0,.4); }

  .form-group { margin-bottom: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

  label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .6px; }

  input[type=text], input[type=email], input[type=password] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px; color: var(--text);
    font-family: var(--font-b); font-size: 14px; outline: none; transition: border-color .18s;
  }
  input:focus { border-color: var(--gold); }
  input::placeholder { color: rgba(240,237,230,0.2); }

  .str-wrap { height: 3px; background: var(--border); border-radius: 4px; margin-top: 8px; }
  .str-bar  { height: 100%; width: 0; border-radius: 4px; transition: width .3s, background .3s; }

  .btn {
    width: 100%; margin-top: 1.25rem; padding: 13px; border: none; border-radius: 11px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%);
    color: #1a1200; font-family: var(--font-h); font-size: 15px; font-weight: 700;
    letter-spacing: .3px; cursor: pointer; transition: opacity .18s, transform .1s;
  }
  .btn:hover { opacity: .92; }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .count-line { text-align: center; margin-top: 1.25rem; font-size: 12px; color: var(--muted); }

  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 18px; font-size: 13.5px; display: flex; align-items: center; gap: 9px;
    opacity: 0; transition: all .3s; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,.5); pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok   { border-color: var(--teal); color: var(--teal); }
  .toast.err  { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a1200" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>MoonVault</h1>
    <p>Secure access portal</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab"        id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="form-signin">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="si-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doSignIn()">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="si-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSignIn()">
      </div>
      <button class="btn" id="btn-signin" onclick="doSignIn()">Sign In</button>
    </div>

    <div id="form-signup" style="display:none">
      <div class="form-row">
        <div class="form-group">
          <label>First name</label>
          <input type="text" id="su-first" placeholder="Alex">
        </div>
        <div class="form-group">
          <label>Last name</label>
          <input type="text" id="su-last" placeholder="Morgan">
        </div>
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="su-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="su-pass" placeholder="Min. 6 characters" oninput="checkStrength(this.value)">
        <div class="str-wrap"><div class="str-bar" id="str-bar"></div></div>
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="su-pass2" placeholder="Repeat password" onkeydown="if(event.key==='Enter')doSignUp()">
      </div>
      <button class="btn" id="btn-signup" onclick="doSignUp()">Create Account</button>
    </div>

    <!-- <p class="count-line" id="user-count">Loading…</p> -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const USERS_KEY = 'nexvault_users';
  const LOGS_KEY  = 'nexvault_logs';

  function getUsers() {
    try { return JSON.parse(localStorage.getItem(USERS_KEY) || '[]'); }
    catch(e) { return []; }
  }
  function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }

  function logEvent(type, email) {
    try {
      const logs = JSON.parse(localStorage.getItem(LOGS_KEY) || '[]');
      logs.push({ type, email, ts: Date.now() });
      localStorage.setItem(LOGS_KEY, JSON.stringify(logs));
    } catch(e) {}
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    const icons = {
      err: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
      ok:  '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>'
    };
    t.className = 'toast show ' + type;
    t.innerHTML = (icons[type] || '') + msg;
    clearTimeout(window._tt);
    window._tt = setTimeout(() => t.className = 'toast', 3500);
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : (btnId === 'btn-signin' ? 'Sign In' : 'Create Account');
  }

  function updateCount() {
    const users = getUsers();
    const n = users.length;
    document.getElementById('user-count').textContent = n + ' registered user' + (n === 1 ? '' : 's');
  }

  function switchTab(tab) {
    document.getElementById('form-signin').style.display = tab === 'signin' ? '' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? '' : 'none';
    document.getElementById('tab-signin').className = 'tab' + (tab === 'signin' ? ' active' : '');
    document.getElementById('tab-signup').className = 'tab' + (tab === 'signup' ? ' active' : '');
    document.getElementById('toast').className = 'toast';
    if(tab === 'signin') updateCount();
  }

  function checkStrength(v) {
    const bar = document.getElementById('str-bar');
    let s = 0;
    if(v.length >= 6)  s++;
    if(v.length >= 10) s++;
    if(/[A-Z]/.test(v) && /[0-9]/.test(v)) s++;
    if(/[^A-Za-z0-9]/.test(v)) s++;
    bar.style.width      = ['0%','30%','55%','80%','100%'][s];
    bar.style.background = ['','#E24B4A','#BA7517','#C9A84C','#1D9E75'][s];
  }

  function doSignIn() {
    const email = document.getElementById('si-email').value.trim().toLowerCase();
    const pass  = document.getElementById('si-pass').value;
    if(!email || !pass) { showToast('Please fill in all fields.', 'err'); return; }

    setLoading('btn-signin', true);
    const user = getUsers().find(u => u.email === email && u.password === pass);
    setLoading('btn-signin', false);

    if(!user) {
      logEvent('fail', email);
      showToast('Incorrect email or password.', 'err');
    } else {
      localStorage.setItem('nexvault_current_user', JSON.stringify(user));
      logEvent('signin', email);
      showToast('Welcome back, ' + user.firstName + '! Access granted.', 'ok');
      document.getElementById('si-email').value = '';
      document.getElementById('si-pass').value  = '';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    }
  }

  function doSignUp() {
    const first = document.getElementById('su-first').value.trim();
    const last  = document.getElementById('su-last').value.trim();
    const email = document.getElementById('su-email').value.trim().toLowerCase();
    const pass  = document.getElementById('su-pass').value;
    const pass2 = document.getElementById('su-pass2').value;

    if(!first||!last||!email||!pass||!pass2) { showToast('Please fill in all fields.', 'err'); return; }
    if(!/\S+@\S+\.\S+/.test(email)) { showToast('Enter a valid email address.', 'err'); return; }
    if(pass.length < 6) { showToast('Password must be at least 6 characters.', 'err'); return; }
    if(pass !== pass2) { showToast('Passwords do not match.', 'err'); return; }

    const users = getUsers();
    if(users.find(u => u.email === email)) {
      showToast('An account with this email already exists.', 'err');
      return;
    }

    users.push({ firstName: first, lastName: last, email, password: pass, balance: 0, createdAt: Date.now() });
    saveUsers(users);
    logEvent('signup', email);

    showToast('Account created! You can now sign in.', 'ok');
    document.getElementById('su-first').value = '';
    document.getElementById('su-last').value  = '';
    document.getElementById('su-email').value = '';
    document.getElementById('su-pass').value  = '';
    document.getElementById('su-pass2').value = '';
    document.getElementById('str-bar').style.width = '0';
    setTimeout(() => switchTab('signin'), 1600);
  }

  updateCount();
</script>
</body>
</html>
